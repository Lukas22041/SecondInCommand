<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Second-in-Command - Homepage</title>
  <link rel="icon" type="image/x-icon"  href="appAssets/facivon/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="appAssets/facivon/favicon.svg" />
  <link rel="icon" type="image/png" sizes="96x96" href="appAssets/facivon/favicon-96x96.png" />
  <style>
    @font-face {
      font-family: 'Insignia';
      src: url('appAssets/Insignia.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Orbitron';
      src: url('appAssets/Orbitron-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Orbitron';
      src: url('appAssets/Orbitron-Medium.ttf') format('truetype');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Orbitron';
      src: url('appAssets/Orbitron-SemiBold.ttf') format('truetype');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
  </style>
  <link rel="stylesheet" href="styles.css" />

  <!-- React 18 + ReactDOM + Babel Standalone (CDN, no build step) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>
<body>
  <div id="root">
    <div class="boot-msg">Initializing skill matrix…</div>
  </div>

  <!-- Load order matters: each file depends on globals defined by the ones above it -->
  <script type="text/babel" data-presets="react" src="js/utils.js"></script>
  <script type="text/babel" data-presets="react" src="js/tooltip.js"></script>
  <script type="text/babel" data-presets="react" src="js/ui.js"></script>
  <script type="text/babel" data-presets="react" src="js/skill.js"></script>
  <script type="text/babel" data-presets="react" src="js/aptitude.js"></script>
  <script type="text/babel" data-presets="react" src="js/gallery.js"></script>
  <script type="text/babel" data-presets="react" src="js/sections.js"></script>
  <script type="text/babel" data-presets="react" src="js/nav.js"></script>
  <script type="text/babel" data-presets="react" src="js/app.js"></script>
</body>
</html>
