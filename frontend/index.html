<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Second-in-Command — Skill Browser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <!-- React 18 + ReactDOM + Babel Standalone (CDN, no build step) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!--
    data.js is auto-generated by start.py (run: python start.py --no-server).
    It sets window.SIC_DATA so the app works on file:// (Chrome blocks fetch on file://).
    When served over HTTP (python start.py), the app falls back to fetch('./api.json') if data.js is missing.
  -->
  <script src="data.js" onerror="console.info('[SIC] data.js not found — will try fetch()')"></script>
</head>
<body>
  <div id="root">
    <div class="boot-msg">Initializing skill matrix…</div>
  </div>

  <script type="text/babel" data-presets="react" src="app.js"></script>
</body>
</html>
